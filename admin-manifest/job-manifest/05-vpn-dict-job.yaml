apiVersion: batch/v1
kind: Job
metadata:
  name: diag-vpn
  namespace: admin
  annotations:
    argocd.argoproj.io/sync-options: "Prune=false"

spec:
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        job-name: diag-vpn
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  job-name: diag-vpn
              topologyKey: kubernetes.io/hostname
      containers:
        - name: diag-tool
          image: suhannugul/capstonetest:latest
          args: [ "vpn" ]
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          envFrom:
            - configMapRef:
                name: job-configmap
            - secretRef:
                name: job-secret
          securityContext:
            capabilities:
              add: ["NET_RAW", "NET_ADMIN" ]
      restartPolicy: Never