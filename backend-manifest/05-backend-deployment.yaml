apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: backend
spec:
  revisionHistoryLimit: 5
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: suhannugul/email-agent:cb2b377c2a7d570eeca41a21a91348cf7662dc5b
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "1Gi"
          envFrom:
            - secretRef:
                name: backend-secret
            - configMapRef:
                name: backend-configmap
