apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: backend
spec:
  revisionHistoryLimit: 5
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: suhannugul/email-agent:a3d0fe527309d845d23b38413173964737776445
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "1Gi"
          envFrom:
            - secretRef:
                name: backend-secret
            - configMapRef:
                name: backend-configmap
